<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Stay Matrix... | StayFinder AI</title>
    <style>
        :root { --gold: #ffd700; --dark: #020617; }
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .matrix-loader {
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-left: 4px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { opacity: 0.7; font-size: 0.9rem; }
        .countdown { color: var(--gold); font-weight: 900; font-size: 1.2rem; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="matrix-loader"></div>
    <h1>Analyzing Stay Path...</h1>
    <p>The requested destination is being synced with the 2026 Global Matrix.</p>
    <p>Redirecting to Secure Search in <span id="timer" class="countdown">5</span> seconds...</p>

    <script>
        let seconds = 5;
        const timerDoc = document.getElementById('timer');
        
        // Vulture Logic: Capture the broken URL and attempt to extract a search term
        const path = window.location.pathname.split('/').pop().replace(/-/g, ' ').replace('.html', '');
        
        const countdown = setInterval(() => {
            seconds--;
            timerDoc.innerText = seconds;
            if(seconds <= 0) {
                clearInterval(countdown);
                // Redirect back to home with the "broken" path as a search query
                window.location.href = `https://brightlane.github.io/StayFinder/?recovered=${encodeURIComponent(path)}`;
            }
        }, 1000);
    </script>
</body>
</html>
