steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Execute Vulture 10K Node Generator
        run: |
          python vulture_10k_gen.py

      # --- NEW STEP: THE ARTICLE ENGINE ---
      - name: Execute Vulture Article Engine
        run: |
          python vulture_article_gen.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vulture-Automator"
          git config --global user.email "vulture@brightlane.github.io"
          git add nodes/ global_nodes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 VULTURE ARTICLE REFRESH: $(date)" && git push)
