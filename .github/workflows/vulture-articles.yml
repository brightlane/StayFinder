name: Vulture Article Engine

on:
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  build-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Article Engine
        run: python vulture_article_gen.py
      - name: Deploy Articles
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "bot@brightlane.io"
          git add nodes/
          git commit -m "🦅 ARTICLE UPDATE" || exit 0
          git push
