<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | StayFinder AI Matrix</title>
    <meta name="robots" content="noindex, follow">
    <style>
        :root { --gold: #ffd700; --dark: #020617; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .error-code { font-size: 10rem; font-weight: 900; color: var(--gold); line-height: 1; opacity: 0.2; position: absolute; z-index: -1; }
        .content { z-index: 1; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }
        .timer-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin: 20px auto; border-radius: 2px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--gold); width: 100%; animation: shrink 5s linear forwards; }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        .btn { 
            background: var(--gold); 
            color: black; 
            padding: 15px 30px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 900; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="error-code">404</div>

    <div class="content">
        <h1>Destination Unknown</h1>
        <p>This specific route is unavailable, but the Matrix is still live.<br> 
        Redirecting you to the <strong>Global Booking Hub</strong> in <span id="seconds">5</span> seconds...</p>
        
        <div class="timer-bar"><div class="timer-fill"></div></div>

        <a href="https://brightlane.github.io/StayFinder/" class="btn">Return to Matrix Now</a>
    </div>

    <script>
        let timeLeft = 5;
        const display = document.getElementById('seconds');
        
        const timer = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                // Redirect back to main index with a tracking tag
                window.location.href = "https://brightlane.github.io/StayFinder/?utm_source=404_recovery&utm_medium=internal";
            }
        }, 1000);
    </script>
</body>
</html>
